<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonic Blob — Slide 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
      }

      /* ---- Canvas (1280x800 fixed) ---- */
      .slide-canvas {
        width: 1280px;
        height: 800px;
        position: relative;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 60%,
          #1a103d 0%,
          #0a0a1a 80%
        );
      }

      /* ---- Ambient background blurs ---- */
      .bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
      }
      .bg-orb-1 {
        width: 600px;
        height: 600px;
        background: rgba(139, 92, 246, 0.15);
        top: -120px;
        left: -100px;
      }
      .bg-orb-2 {
        width: 500px;
        height: 500px;
        background: rgba(236, 72, 153, 0.1);
        bottom: -160px;
        right: -80px;
      }
      .bg-orb-3 {
        width: 350px;
        height: 350px;
        background: rgba(168, 85, 247, 0.08);
        top: 50%;
        left: 60%;
        transform: translate(-50%, -50%);
      }

      /* ---- Visualizer container (Previously Browser frame) ---- */
      .visualizer-container {
        width: 640px;
        height: 400px;
        position: relative;
        overflow: visible;
      }
      .browser-dots {
        display: flex;
        gap: 6px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(139, 92, 246, 0.1);
      }
      .browser-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
      }
      .browser-dots span:nth-child(1) {
        background: rgba(255, 95, 86, 0.6);
      }
      .browser-dots span:nth-child(2) {
        background: rgba(255, 189, 46, 0.6);
      }
      .browser-dots span:nth-child(3) {
        background: rgba(39, 201, 63, 0.6);
      }

      /* ---- Floating particles (static) ---- */
      .particle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.5;
      }
    </style>
  </head>
  <body class="bg-gray-950 flex items-center justify-center min-h-screen">
    <!-- ======== SLIDE CANVAS (1280x800) ======== -->
    <div class="slide-canvas flex flex-col items-center pt-16">
      <!-- Background orbs -->
      <div class="bg-orb bg-orb-1"></div>
      <div class="bg-orb bg-orb-2"></div>
      <div class="bg-orb bg-orb-3"></div>

      <!-- Floating particles -->
      <div
        class="particle"
        style="
          width: 4px;
          height: 4px;
          background: rgba(168, 85, 247, 0.6);
          top: 15%;
          left: 20%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 3px;
          height: 3px;
          background: rgba(236, 72, 153, 0.5);
          top: 25%;
          left: 75%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 5px;
          height: 5px;
          background: rgba(139, 92, 246, 0.4);
          top: 60%;
          left: 15%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 3px;
          height: 3px;
          background: rgba(168, 85, 247, 0.5);
          top: 70%;
          left: 80%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 4px;
          height: 4px;
          background: rgba(236, 72, 153, 0.4);
          top: 40%;
          left: 90%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 3px;
          height: 3px;
          background: rgba(139, 92, 246, 0.6);
          top: 10%;
          left: 55%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 5px;
          height: 5px;
          background: rgba(168, 85, 247, 0.3);
          top: 80%;
          left: 40%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 3px;
          height: 3px;
          background: rgba(236, 72, 153, 0.5);
          top: 50%;
          left: 30%;
        "
      ></div>

      <!-- ---- Headline text (upper portion) ---- -->
      <div class="relative z-10 text-center mb-16 mt-0">
        <h1
          class="text-7xl font-extrabold text-white leading-tight tracking-tight"
        >
          Turn audio into a <br />
          <span
            class="bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent"
            >visual vibe</span
          >
        </h1>
      </div>

      <!-- ---- Visualizer with screenshot ---- -->
      <div class="relative z-10 visualizer-container">
        <!-- Screenshot image -->
        <div class="relative w-full h-full">
          <img
            src="../public/logo.png"
            alt="Sonic Blob logo"
            style="width: 100%; height: 100%; object-fit: contain"
          />
        </div>
      </div>
    </div>
    <!-- ======== END SLIDE CANVAS ======== -->
    <script src="assets/nav.js"></script>
  </body>
</html>
