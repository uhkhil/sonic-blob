<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonic Blob — Slide 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
      }

      /* ---- Canvas ---- */
      .slide-canvas {
        width: 1280px;
        height: 800px;
        position: relative;
        overflow: hidden;
        background: radial-gradient(
          ellipse at 50% 50%,
          #1a103d 0%,
          #0a0a1a 80%
        );
      }

      /* ---- Ambient orbs ---- */
      .bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
      }

      /* ---- Visual Item Container ---- */
      .visual-item {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        position: relative;
      }
      .visual-item img {
        width: 350%;
        height: 350%;
        object-fit: contain;
        filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.6));
      }

      /* ---- Theme Labels ---- */
      .theme-label {
        font-size: 16px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #c084fc, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ---- Glow effects ---- */
      .glow-purple {
        background: radial-gradient(
          circle,
          rgba(128, 0, 255, 0.15) 0%,
          transparent 70%
        );
      }
      .glow-cyber {
        background: radial-gradient(
          circle,
          rgba(0, 133, 143, 0.15) 0%,
          transparent 70%
        );
      }
      .glow-solar {
        background: radial-gradient(
          circle,
          rgba(255, 51, 0, 0.15) 0%,
          transparent 70%
        );
      }

      /* ---- Swatches ---- */
      .swatch-group {
        display: flex;
        gap: 8px;
        margin-top: 24px;
      }
      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* ---- Particles ---- */
      .particle {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        opacity: 0.4;
      }
    </style>
  </head>
  <body class="bg-gray-950 flex items-center justify-center min-h-screen">
    <!-- ======== SLIDE CANVAS (1280x800) ======== -->
    <div class="slide-canvas flex flex-col items-center justify-center">
      <!-- Background orbs -->
      <div
        class="bg-orb"
        style="
          width: 500px;
          height: 500px;
          background: rgba(139, 92, 246, 0.08);
          top: -50px;
          left: 10%;
        "
      ></div>
      <div
        class="bg-orb"
        style="
          width: 400px;
          height: 400px;
          background: rgba(236, 72, 153, 0.06);
          bottom: -50px;
          right: 15%;
        "
      ></div>
      <div
        class="bg-orb"
        style="
          width: 350px;
          height: 350px;
          background: rgba(234, 179, 8, 0.04);
          bottom: 20%;
          left: 60%;
        "
      ></div>

      <!-- Particles -->
      <div
        class="particle"
        style="
          width: 3px;
          height: 3px;
          background: rgba(168, 85, 247, 0.5);
          top: 10%;
          left: 8%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 4px;
          height: 4px;
          background: rgba(236, 72, 153, 0.4);
          top: 85%;
          right: 10%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 3px;
          height: 3px;
          background: rgba(234, 179, 8, 0.4);
          top: 20%;
          right: 5%;
        "
      ></div>
      <div
        class="particle"
        style="
          width: 4px;
          height: 4px;
          background: rgba(168, 85, 247, 0.3);
          bottom: 12%;
          left: 15%;
        "
      ></div>

      <!-- ---- Headline ---- -->
      <div class="relative z-10 text-center mb-14">
        <h1
          class="text-6xl font-extrabold text-white leading-tight tracking-tight"
        >
          Tune the look to
          <span
            class="bg-gradient-to-r from-purple-400 via-pink-400 to-yellow-400 bg-clip-text text-transparent"
            >match your vibe</span
          >
        </h1>
      </div>

      <!-- ---- Three theme cards ---- -->
      <div class="relative z-10 flex items-center gap-12">
        <!-- Theme 1: Amethyst -->
        <div class="theme-card">
          <div class="visual-item glow-purple">
            <img src="assets/amethyst.png" alt="Amethyst Theme" />
          </div>
        </div>

        <!-- Theme 2: Cyberpunk (central focus) -->
        <div class="theme-card scale-110">
          <div class="visual-item glow-cyber">
            <img src="assets/cyberpunk.png" alt="Cyberpunk Theme" />
          </div>
        </div>

        <!-- Theme 3: Solar Flare -->
        <div class="theme-card">
          <div class="visual-item glow-solar">
            <img src="assets/solar-flare.png" alt="Solar Flare Theme" />
          </div>
        </div>
      </div>
    </div>
    <!-- ======== END SLIDE CANVAS ======== -->

    <script src="assets/nav.js"></script>
  </body>
</html>
